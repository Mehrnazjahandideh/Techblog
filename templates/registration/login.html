{% extends 'base.html' %}
{% block title %}log in{% endblock title %}
{% block content %}
    

    <div id="content-wrap">
    <main>
        <div class="register-section">
            <h2>log in</h2>
            <form  method="POST" class="register-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    {{form.username}}
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    {{form.password}}
                </div>
               
                <button type="submit" class="submit-btn">log in</button>
            </form>
            <p class="register-footer">
                Dont have an account? <a href="{% url 'signup' %}" style='#DAD2FF'>sign up</a>.
                <hr>
                forget your password? <a href="{% url 'password_reset' %}" style='#DAD2FF'>Forget your password</a>
            </p>
        </div>
    </main>
    </div>
  
{% endblock content %}
