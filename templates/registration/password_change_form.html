{% extends 'base.html' %}
{% block title %}Password Change{% endblock title %}
{% block content %}
    
    <div id="content-wrap">
    <main>
        <div class="register-section">
            <h2>Password Change</h2>
           
            <form  method="POST" class="register-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="old_password">Old_password</label>
                    {{form.old_password}}
                </div>
                
                <div class="form-group">
                    <label for="new_password1">New Password</label>
                    {{form.new_password1}}
                </div>
                <div class="form-group">
                    <label for="new_password2">New password confirmation</label>
                    {{form.new_password2}}
                </div>
               
                <button type="submit" class="submit-btn">Change My Password</button>
            </form>
         
        </div>
    </main>
    </div>
  
{% endblock content %}
